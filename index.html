<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACR Budget Plus | Live from Apps Script</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;margin:0}
.hdr{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center}
.logo{background:#f59e0b;color:#1a3a5c;font-weight:800;border-radius:10px;padding:8px 12px;margin-right:10px}
.reload{margin-left:auto;background:#ffffff33;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer}
#loading{padding:40px;text-align:center}
#error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:8px;display:none;margin:20px}
pre{background:#fff;padding:12px;border-radius:8px;font-size:12px;overflow:auto}
</style>
</head>

<body>

<div class="hdr">
  <div class="logo">อจ</div>
  <div>
    <div style="font-weight:800">ACR Budget Plus</div>
    <div style="font-size:11px;opacity:.7">จังหวัดอำนาจเจริญ | Live from Apps Script</div>
  </div>
  <button class="reload" onclick="loadData()">🔄 โหลดใหม่</button>
</div>

<div id="loading">⏳ กำลังโหลดข้อมูลจาก Apps Script...</div>
<div id="error"></div>

<script>
// =====================================================
// ✅ ใช้ Web App /exec ที่คุณให้มา (ใส่ให้แล้ว)
// =====================================================
const WEB_APP_EXEC_URL =
  "https://script.google.com/macros/s/AKfycbzULJzY-wPzpKasnMm_lllbsff8JLmUon8BBJ3Ybx1PkxzUM-uURlb4UtLuZGxKPJFxmA/exec";

// state
let DATA = null;

async function loadData(){
  document.getElementById("loading").style.display="block";
  document.getElementById("error").style.display="none";

  try{
    const res = await fetch(WEB_APP_EXEC_URL, {
      method: "GET",
      redirect: "follow",
      cache: "no-store"
    });

    if(!res.ok) throw new Error("HTTP " + res.status);

    const text = await res.text();
    let json;

    try{
      json = JSON.parse(text);
    }catch{
      throw new Error("Apps Script ไม่ได้ส่ง JSON");
    }

    if(!json.summary || !json.agencies){
      throw new Error("JSON ต้องมี summary และ agencies");
    }

    DATA = json;

    document.getElementById("loading").innerHTML =
      "✅ โหลดข้อมูลสำเร็จจาก Apps Script<br><br>" +
      "<strong>ตัวอย่างข้อมูล summary:</strong>" +
      "<pre>" + JSON.stringify(DATA.summary,null,2) + "</pre>";

  }catch(err){
    document.getElementById("loading").style.display="none";
    const el = document.getElementById("error");
    el.style.display="block";
    el.innerHTML =
      "❌ โหลดข้อมูลไม่สำเร็จ<br><br>" +
      err.message +
      "<br><br>ถ้าเปิดลิงก์ /exec แล้วเห็น HTML แสดงว่า Apps Script ยังไม่ได้ return JSON";
  }
}

window.onload = loadData;
</script>

</body>
</html>
