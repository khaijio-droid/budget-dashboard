<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACR Budget Plus | Live from Google Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a3a5c;--primary2:#2563a8;--accent:#f59e0b;
  --success:#16a34a;--warning:#ea580c;--danger:#dc2626;
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --c-inv:#2563a8;--c-op:#059669;--c-sub:#7c3aed;--c-cen:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text)}

.hdr{background:linear-gradient(135deg,#0f2744,#1e4d8c);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.logo{width:44px;height:44px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#0f2744;font-size:17px;flex-shrink:0}
.hdr-info h1{font-size:15px;font-weight:700}
.hdr-info p{font-size:10px;opacity:.6;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:10px}
.ldot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
.reload-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:.15s}
.reload-btn:hover{background:rgba(255,255,255,.35)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SETUP SCREEN */
#setupScreen{max-width:640px;margin:60px auto;padding:0 20px}
.setup-card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.setup-icon{font-size:48px;text-align:center;margin-bottom:16px}
.setup-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:8px}
.setup-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.6}
.steps{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.step{display:flex;gap:12px;align-items:flex-start;background:#f8fafc;border-radius:12px;padding:12px 14px}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--primary2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-text{font-size:13px;line-height:1.5}
.step-text strong{color:var(--primary2)}
.url-box{background:#f1f5f9;border-radius:8px;padding:8px 12px;font-size:11px;font-family:monospace;color:var(--muted);word-break:break-all;margin-top:6px;border:1px solid var(--border)}
.setup-btn{width:100%;padding:12px;background:var(--primary2);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.setup-btn:hover{background:var(--primary)}
.err-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:12px 14px;font-size:12px;color:#b91c1c;margin-top:12px;display:none}

/* LOADING */
#loadingScreen{display:none;max-width:400px;margin:100px auto;text-align:center;padding:20px}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary2);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAIN DASHBOARD */
#dashboard{display:none;padding:14px 20px;max-width:1300px;margin:0 auto}

/* BREADCRUMB / NAV */
.bc{display:flex;align-items:center;gap:5px;padding:7px 20px;background:#fff;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap;position:sticky;top:68px;z-index:300}
.bcl{color:var(--primary2);cursor:pointer;font-weight:600}
.bcl:hover{text-decoration:underline}
.bcs{color:var(--muted)}
.nav{display:flex;background:#fff;border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto;position:sticky;top:99px;z-index:200}
.ntab{padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s;font-family:inherit;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;display:flex;align-items:center;gap:5px}
.ntab:hover{color:var(--primary2)}
.ntab.active{color:var(--primary2);border-bottom-color:var(--primary2)}
.nb{font-size:10px;background:#f1f5f9;color:var(--muted);border-radius:10px;padding:1px 6px}
.ntab.active .nb{background:var(--primary2);color:#fff}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* KPI HERO */
.hero{background:linear-gradient(135deg,#0f2744,#1a4a8a);border-radius:16px;padding:18px 22px;color:#fff;margin-bottom:14px}
.hero-grid{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start}
.hero-main{flex:1;min-width:180px}
.hero-main .ht{font-size:10px;opacity:.6;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.hero-main .hb{font-size:38px;font-weight:800;line-height:1;letter-spacing:-1px}
.hero-main .hs{font-size:12px;opacity:.6;margin-top:4px}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap}
.hstat{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;min-width:115px;flex:1;cursor:pointer;transition:.15s}
.hstat:hover{background:rgba(255,255,255,.18)}
.hstat .sl{font-size:9px;opacity:.6;margin-bottom:2px}
.hstat .sv{font-size:18px;font-weight:800;line-height:1}
.hstat .ss{font-size:9px;opacity:.5;margin-top:2px}
.hstat .sbar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:7px;overflow:hidden}
.hstat .sfill{height:100%;border-radius:2px}

/* BUDGET TYPE CARDS */
.sec-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase}
.btype-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.btcard{background:var(--card);border-radius:13px;border:1px solid var(--border);padding:16px;position:relative;overflow:hidden}
.btcard .bc-icon{font-size:22px;margin-bottom:8px}
.btcard .bc-name{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px}
.btcard .bc-alloc{font-size:22px;font-weight:800;line-height:1}
.btcard .bc-spent{font-size:11px;color:var(--muted);margin:4px 0 10px}
.pbar-wrap{background:#f1f5f9;border-radius:5px;height:7px}
.pbar-fill{height:100%;border-radius:5px;background:var(--c)}
.pbar-lbl{display:flex;justify-content:space-between;margin-top:5px;font-size:11px}

/* TARGETS */
.q-tabs{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.qtab{padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:inherit}
.qtab:hover{border-color:var(--primary2);color:var(--primary2)}
.qtab.active{background:var(--primary2);color:#fff;border-color:var(--primary2)}
.qtab.cur{box-shadow:0 0 0 3px rgba(37,99,168,.2)}
.qtab-s{font-size:9px;display:block;opacity:.55;margin-top:1px}

.cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:14px}
.ccard{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden}
.gauge-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.gauge{position:relative;width:84px;height:84px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg)}
.g-track{fill:none;stroke:#f1f5f9;stroke-width:10}
.g-tgt{fill:none;stroke-width:10;stroke-dasharray:283;opacity:.28}
.g-act{fill:none;stroke-width:10;stroke-dasharray:283;transition:stroke-dashoffset .8s ease}
.g-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.g-pct{font-size:16px;font-weight:800;line-height:1}
.g-lbl{font-size:8px;color:var(--muted);margin-top:1px}
.gi{flex:1}
.gi-row{display:flex;justify-content:space-between;margin-bottom:6px}
.gi-l{font-size:11px;color:var(--muted)}
.gi-r{font-size:13px;font-weight:800}
.dbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.dabove{background:#dcfce7;color:#15803d}.dbelow{background:#fee2e2;color:#dc2626}.deq{background:#f1f5f9;color:#475569}

.qp-wrap{margin-top:4px}
.qp-title{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.qp-row{display:grid;grid-template-columns:38px 1fr 80px;gap:6px;align-items:center;margin-bottom:6px}
.qp-lbl{font-size:9px;font-weight:700;text-align:right}
.qp-track{background:#f1f5f9;border-radius:4px;height:16px;position:relative;overflow:hidden}
.qp-tgt{position:absolute;top:0;left:0;height:100%;opacity:.22;border-radius:4px}
.qp-act{position:absolute;top:0;left:0;height:100%;border-radius:4px}
.qp-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(0,0,0,.25)}
.qp-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.qp-vals{font-size:9px;text-align:right;line-height:1.6}
.qp-tv{color:var(--muted)}.qp-av{font-weight:700}

/* TABLE SECTION */
.tbl-sec{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.tbl-hdr2{padding:12px 15px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.tbl-hdr2::before{content:'';width:4px;height:15px;background:var(--accent);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 11px;text-align:center;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border);background:#fafafa;white-space:nowrap}
thead th:first-child{text-align:left}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
tbody tr:hover{background:#f0f7ff}
tbody td{padding:8px 11px;text-align:center;vertical-align:middle}
tbody td:first-child{text-align:left;font-weight:700}

/* AGENCY PAGE */
.ftabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ftab{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;transition:.15s;font-family:inherit}
.ftab:hover,.ftab.active{background:var(--primary2);color:#fff;border-color:var(--primary2)}
.toolbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.sbox{flex:1;min-width:160px;padding:7px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;outline:none}
.sbox:focus{border-color:var(--primary2)}
.ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.acard{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px;cursor:pointer;transition:.2s;overflow:hidden;position:relative}
.acard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--primary2)}
.acard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--bclr,#ccc)}
.ttag{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700}
.aname{font-size:12px;font-weight:700;margin-bottom:5px;line-height:1.3;padding-right:48px}
.prow{display:flex;gap:5px;margin-bottom:4px;align-items:center}
.plbl{font-size:9px;color:var(--muted);width:58px;flex-shrink:0}
.ptr-w{flex:1;position:relative;height:6px}
.ptr-bg{position:absolute;inset:0;background:#f1f5f9;border-radius:3px;overflow:hidden}
.ptr-act{position:absolute;top:0;left:0;height:100%;border-radius:3px}
.ptr-tline{position:absolute;top:-2px;bottom:-2px;width:2px;background:#1a3a5c;border-radius:1px;z-index:2}
.pval{font-size:10px;font-weight:700;min-width:36px;text-align:right}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bs{background:#dcfce7;color:#15803d}.bw{background:#fef9c3;color:#a16207}.bd{background:#fee2e2;color:#b91c1c}
.type-abj{background:#ede9fe;color:#6d28d9}
.type-muni{background:#e0f2fe;color:#0369a1}
.type-abt{background:#dcfce7;color:#15803d}
.type-gov{background:#f1f5f9;color:#475569}

/* DETAIL PAGE */
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--primary2);color:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;margin-bottom:12px;border:none;font-family:inherit}
.back-btn:hover{background:var(--primary)}
.det-kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.dkpi{background:var(--card);border-radius:11px;padding:12px 14px;border:1px solid var(--border);border-left:4px solid var(--c)}
.dk-lbl{font-size:10px;color:var(--muted);margin-bottom:3px}
.dk-val{font-size:17px;font-weight:800;color:var(--c)}
.dk-sub{font-size:10px;color:var(--muted);margin-top:1px}

.tgt-row{background:var(--card);border-radius:11px;border:1px solid var(--border);padding:13px 15px;margin-bottom:12px}
.tgt-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:9px;text-transform:uppercase;letter-spacing:.4px}
.tgt-items{display:flex;flex-wrap:wrap;gap:10px}
.tgt-item{flex:1;min-width:150px}
.ti-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.ti-track{background:#f1f5f9;border-radius:6px;height:20px;position:relative;overflow:hidden;margin-bottom:3px}
.ti-tgt{position:absolute;top:0;left:0;height:100%;opacity:.22;border-radius:6px}
.ti-act{position:absolute;top:0;left:0;height:100%;border-radius:6px}
.ti-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(0,0,0,.25)}
.ti-inner{position:absolute;inset:0;display:flex;align-items:center;padding-left:7px;font-size:9px;font-weight:700;color:#fff;gap:5px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.ti-vals{display:flex;justify-content:space-between;font-size:10px}

@media(max-width:680px){.cmp-grid{grid-template-columns:1fr}.hero-main .hb{font-size:28px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">อจ</div>
  <div class="hdr-info">
    <h1>ACR Budget Plus</h1>
    <p>จังหวัดอำนาจเจริญ | ปีงบประมาณ 2569 | Live from Google Sheets</p>
  </div>
  <div class="hdr-right">
    <div class="live-badge"><span class="ldot"></span><span id="lastUpdate">กำลังโหลด...</span></div>
    <button class="reload-btn" onclick="loadData()">🔄 รีโหลด</button>
  </div>
</div>

<div id="setupScreen" style="display:none">
  <div class="setup-card">
    <div class="setup-icon">📊</div>
    <div class="setup-title">เชื่อมต่อ Google Sheets</div>
    <div class="setup-sub">ระบบดึงข้อมูลไม่สำเร็จ กรุณาตรวจสอบการแชร์ไฟล์</div>
    <button class="setup-btn" onclick="loadData()">🚀 ลองอีกครั้ง</button>
    <div class="err-box" id="errBox"></div>
  </div>
</div>

<div id="loadingScreen" style="display:block">
  <div class="spinner"></div>
  <div style="font-size:14px;font-weight:600;color:var(--muted);text-align:center">กำลังดึงข้อมูลสดจาก Google Sheets...</div>
</div>

<div class="bc" id="bc" style="display:none"><span style="font-weight:600">🏠 ภาพรวม</span></div>

<div class="nav" id="mainNav" style="display:none">
  <button class="ntab active" onclick="goPage('overview')" id="nt-ov">📊 ภาพรวม + เป้าหมาย</button>
  <button class="ntab" onclick="goPage('agencies')" id="nt-ag">🏛️ หน่วยงาน <span class="nb" id="nb-all">—</span></button>
</div>

<div id="dashboard">
  <div id="pg-overview" class="page active">
    <div class="hero" id="heroBlock"></div>
    <div class="sec-lbl">สรุปตามประเภทงบ</div>
    <div class="btype-grid" id="btypeGrid"></div>
    <div class="q-tabs" id="qTabs">
      <button class="qtab" onclick="setQ(1,this)">ไตรมาส 1</button>
      <button class="qtab cur active" onclick="setQ(2,this)">ไตรมาส 2</button>
    </div>
    <div class="cmp-grid" id="cmpGrid"></div>
  </div>

  <div id="pg-agencies" class="page">
    <div class="toolbar">
      <input class="sbox" id="srch" placeholder="🔍 ค้นหาหน่วยงาน..." oninput="renderAg()">
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px" id="agTitle">—</div>
    <div class="ag-grid" id="agGrid"></div>
  </div>

  <div id="pg-detail" class="page">
    <button class="back-btn" onclick="backDet()">← กลับ</button>
    <div id="detContent"></div>
  </div>
</div>

<script>
const TARGETS={
  'ภาพรวม':      {q1:[38,33],q2:[61,55],q3:[81,76],q4:[100,93]},
  'รายจ่ายประจำ': {q1:[38,37],q2:[61,60],q3:[84,83],q4:[100,98]},
  'รายจ่ายลงทุน': {q1:[36,20],q2:[59,38],q3:[69,55],q4:[100,75]},
};
const TC={'ภาพรวม':'#2563a8','รายจ่ายประจำ':'#059669','รายจ่ายลงทุน':'#ea580c'};
const TI={'ภาพรวม':'📊','รายจ่ายประจำ':'📋','รายจ่ายลงทุน':'🏗️'};
const BT_ICONS={'งบลงทุน':'🏗️','งบประจำ':'📋','เงินอุดหนุนเฉพาะกิจ':'💰','งบกลาง':'🏦'};
const BT_COLORS={'งบลงทุน':'#2563a8','งบประจำ':'#059669','เงินอุดหนุนเฉพาะกิจ':'#7c3aed','งบกลาง':'#64748b'};

const SHEET_ID = '1InruqYSLdiuIYZNUbiNqzioHTvUwoH5Tz2jTCFjPjnE';
const GID = '391006169'; 
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

let DATA=null, curQ=2, curGrp='all', curSrt='alloc', curV='card', prevPage='overview';

const fmt=n=>n==null?'—':Number(n).toLocaleString('th',{minimumFractionDigits:2,maximumFractionDigits:2});
const bc=p=>p>=70?'#16a34a':p>=50?'#ea580c':'#dc2626';

async function loadData(){
  document.getElementById('loadingScreen').style.display='block';
  try {
    const res = await fetch(CSV_URL);
    const csv = await res.text();
    DATA = parseCSV(csv);
    showDashboard();
  } catch(e){
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('setupScreen').style.display='block';
    document.getElementById('errBox').innerHTML = "ดึงข้อมูลล้มเหลว กรุณาเช็คการแชร์ไฟล์";
  }
}

function parseCSV(csv){
  const lines = csv.split('\n').map(l=>l.trim()).filter(l=>l);
  
  // ค้นหาแถวที่มีหัวตาราง "หน่วยงาน"
  const headerIdx = lines.findIndex(l => l.includes("หน่วยงาน"));
  if(headerIdx === -1) return null;

  const headers = parseCSVLine(lines[headerIdx]);
  const col=(row,name)=>row[headers.findIndex(h=>h.includes(name))]||'';
  const toNum=s=>parseFloat(String(s).replace(/[",]/g,''))||0;

  const agMap={};
  for(let i=headerIdx+1; i<lines.length; i++){
    const row=parseCSVLine(lines[i]);
    const aname=col(row,'หน่วยงาน');
    if(!aname || aname.includes('Grand Total') || aname.includes('รายงาน')) continue;

    const alloc=toNum(col(row,'งบจัดสรร'));
    const spent=toNum(col(row,'เบิกจ่ายทั้งสิ้น'));
    const budgetType=col(row,'งบรายจ่าย');

    if(!agMap[aname]) agMap[aname]={name:aname,alloc:0,spent:0,grp:{'งบลงทุน':{a:0,s:0},'งบประจำ':{a:0,s:0}}};
    agMap[aname].alloc+=alloc; agMap[aname].spent+=spent;
    if(budgetType.includes('ลงทุน')) { agMap[aname].grp['งบลงทุน'].a+=alloc; agMap[aname].grp['งบลงทุน'].s+=spent; }
    else { agMap[aname].grp['งบประจำ'].a+=alloc; agMap[aname].grp['งบประจำ'].s+=spent; }
  }

  const agencies=Object.values(agMap).map(ag=>({
    n:ag.name, a:ag.alloc, sp:ag.spent, pa:ag.alloc>0?ag.spent/ag.alloc*100:0, g:getGroup(ag.name), grp:ag.grp
  })).sort((a,b)=>b.a-a.a);

  const s={a:agencies.reduce((x,y)=>x+y.a,0), s:agencies.reduce((x,y)=>x+y.sp,0)};
  s.p=s.a>0?s.s/s.a*100:0;

  return{summary:s, agencies};
}

function parseCSVLine(line){
  const result=[]; let cur='', inQ=false;
  for(let c of line){
    if(c==='"') inQ=!inQ;
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim()); return result;
}

function getGroup(name){
  if(name.includes('องค์การบริหารส่วนจังหวัด')) return 'อบจ.';
  if(name.includes('เทศบาล')) return 'เทศบาล';
  if(name.includes('ตำบล')) return 'อบต.';
  return 'ราชการ';
}

function showDashboard(){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainNav').style.display='flex';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('lastUpdate').textContent = `อัปเดต ${new Date().toLocaleTimeString('th-TH')}`;
  renderOverview();
}

function goPage(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+pg).classList.add('active');
  if(pg==='agencies') renderAg();
}

function renderOverview(){
  const s=DATA.summary;
  document.getElementById('heroBlock').innerHTML=`
    <div class="hero-grid">
      <div class="hero-main">
        <div class="ht">งบจัดสรรรวม</div>
        <div class="hb">${fmt(s.a)}</div>
        <div class="hs">ล้านบาท | ${DATA.agencies.length} หน่วยงาน</div>
      </div>
      <div class="hstat">
        <div class="sl">%เบิกจ่ายภาพรวม</div>
        <div class="sv" style="color:${bc(s.p)}">${s.p.toFixed(2)}%</div>
      </div>
    </div>`;
}

function renderAg(){
  const list=DATA.agencies;
  document.getElementById('agGrid').innerHTML=list.map(a=>`
    <div class="acard" onclick="openDet('${a.n}')">
      <div class="aname">${a.n}</div>
      <div class="pval" style="color:${bc(a.pa)}">${a.pa.toFixed(2)}%</div>
    </div>`).join('');
}

window.onload = loadData;
</script>
